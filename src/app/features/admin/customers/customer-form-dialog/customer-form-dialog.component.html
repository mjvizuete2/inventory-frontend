<h2 mat-dialog-title>
  {{ data.mode === 'create' ? 'Agregar cliente' : 'Editar cliente' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="customer-form">
    <div class="customer-form__grid">
      <mat-form-field appearance="outline">
        <mat-label>Tipo documento</mat-label>
        <mat-select formControlName="documentType">
          <mat-option value="CEDULA">Cedula</mat-option>
          <mat-option value="RUC">RUC</mat-option>
          <mat-option value="EXTRANJERO">Extranjero</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Identificacion</mat-label>
        <input matInput formControlName="documentNumber" />
      </mat-form-field>

      <div class="customer-form__full" *ngIf="isExistingCustomer()">
        Cliente existente encontrado. Se usaran sus datos registrados.
      </div>

      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Correo</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefono</mat-label>
        <input matInput formControlName="phone" />
        <mat-error *ngIf="form.controls.phone.hasError('pattern')">Debe tener 10 digitos.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="customer-form__full">
        <mat-label>Direccion</mat-label>
        <input matInput formControlName="address" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ciudad</mat-label>
        <input matInput formControlName="city" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Estado</mat-label>
        <mat-select formControlName="status">
          <mat-option value="active">Activo</mat-option>
          <mat-option value="inactive">Inactivo</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">
    {{ isExistingCustomer() ? 'Usar cliente' : (data.mode === 'create' ? 'Guardar' : 'Actualizar') }}
  </button>
</mat-dialog-actions>

<h2 mat-dialog-title>
  {{ data.mode === 'create' ? 'Nuevo producto' : 'Editar producto' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="product-form">
    <div class="product-form__grid">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>SKU</mat-label>
        <input matInput formControlName="sku" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option *ngFor="let category of data.categories" [value]="category.id">
            {{ category.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Estado</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let status of statuses" [value]="status.value">
            {{ status.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio</mat-label>
        <input matInput type="number" min="0.01" step="0.01" formControlName="price" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Stock</mat-label>
        <input matInput type="number" min="0" step="1" formControlName="stock" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="product-form__full">
        <mat-label>Proveedor</mat-label>
        <input matInput formControlName="supplier" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="product-form__full">
        <mat-label>Descripcion</mat-label>
        <textarea matInput rows="4" formControlName="description"></textarea>
      </mat-form-field>
    </div>

    <mat-slide-toggle formControlName="iva">Aplicar IVA</mat-slide-toggle>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">
    {{ data.mode === 'create' ? 'Crear' : 'Guardar' }}
  </button>
</mat-dialog-actions>
